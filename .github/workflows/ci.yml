name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-bi-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: |
          cd smart-bi/frontend
          npm install
          npx max build

  build-ai-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: |
          cd ai-quiz/frontend
          npm install
          npm run build

  build-oj-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: |
          cd online-judge/frontend
          npm install
          npm run build

  build-bi-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: |
          cd smart-bi/backend
          mvn compile -DskipTests

  build-ai-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: |
          cd ai-quiz/backend
          mvn compile -DskipTests

  build-oj-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: |
          cd online-judge/backend
          mvn compile -DskipTests
